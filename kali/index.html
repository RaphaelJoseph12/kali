<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💕 Pink Landing Page 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #ffd1ff 100%);
            font-family: 'Segoe UI', 'Arial', 'Georgia', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .heart-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            font-size: 18px;
            opacity: 0.6;
            animation: floatUp 9s linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .landing-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 40px;
            padding: 45px 35px 35px;
            width: min(540px, 90%);
            text-align: center;
            box-shadow: 0 18px 60px rgba(255, 105, 180, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(6px);
        }

        .landing-card h1 {
            font-size: 2.4rem;
            color: #d63384;
            margin-bottom: 15px;
        }

        .landing-card p {
            color: #a83c6e;
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .ribbon-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 240px;
            height: 240px;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.95), rgba(255, 182, 193, 0.9));
            border-radius: 50%;
            box-shadow: 0 18px 35px rgba(255, 0, 119, 0.16);
            position: relative;
            text-decoration: none;
            color: #c9184a;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .ribbon-link:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 24px 45px rgba(255, 0, 119, 0.24);
        }

        .ribbon {
            position: absolute;
            width: 220px;
            height: 62px;
            background: linear-gradient(135deg, #ff4d6d, #ff9bcc);
            border-radius: 999px;
            top: 58px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
        }

        .ribbon::before,
        .ribbon::after {
            content: '';
            position: absolute;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ffbfd3, #ff4d6d);
            border-radius: 45px 45px 50px 20px;
            top: -28px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.12);
        }

        .ribbon::before {
            left: 16px;
            transform: rotate(-20deg);
        }

        .ribbon::after {
            right: 16px;
            transform: rotate(20deg);
        }

        .ribbon-knot {
            position: absolute;
            width: 62px;
            height: 62px;
            background: radial-gradient(circle at 30% 30%, #fff3f9, #ff4d6d);
            border-radius: 50%;
            top: 46px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 22px rgba(255, 0, 119, 0.18);
            border: 4px solid rgba(255,255,255,0.65);
        }

        .ribbon-tail {
            position: absolute;
            width: 42px;
            height: 110px;
            background: linear-gradient(180deg, #ff758f 0%, #ff4d6d 100%);
            border-radius: 0 0 22px 22px;
            top: 110px;
        }

        .ribbon-tail.left {
            left: 74px;
            transform: rotate(-8deg);
        }

        .ribbon-tail.right {
            right: 74px;
            transform: rotate(8deg);
        }

        .ribbon-text {
            position: absolute;
            width: 100%;
            top: 68px;
            left: 0;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: white;
            text-shadow: 0 0 8px rgba(0,0,0,0.12);
        }

        .open-icon {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
        }

        @media (max-width: 520px) {
            .landing-card {
                padding: 30px 22px 28px;
            }
            .landing-card h1 {
                font-size: 1.85rem;
            }
            .landing-card p {
                font-size: 1rem;
            }
            .ribbon-link {
                width: 200px;
                height: 200px;
            }
            .ribbon {
                width: 160px;
                height: 160px;
                top: 20px;
                left: 20px;
            }
            .ribbon::before,
            .ribbon::after {
                width: 95px;
                height: 38px;
                top: 45px;
                left: 30px;
            }
            .ribbon-knot {
                top: 62px;
                left: 61px;
            }
            .ribbon-tail {
                width: 35px;
                height: 110px;
                left: 74px;
                top: 95px;
            }
            .ribbon-text {
                top: 105px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="heart-bg" id="heartBg"></div>

    <div class="landing-card">
        <h1>Welcome my little Rei</h1>
        <p>Tap the ribbon to unwrap what's inside.</p>

        <a class="ribbon-link" href="second.html" aria-label="Open second page">
            <div class="ribbon"></div>
            <div class="ribbon-knot"></div>
            <div class="ribbon-tail left"></div>
            <div class="ribbon-tail right"></div>
            <div class="ribbon-text">Open Me</div>
            <div class="open-icon">🎀</div>
        </a>
    </div>

    <script>
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.textContent = ['💖', '💕', '💗', '💓', '💝', '🌸', '🌷', '💘'][Math.floor(Math.random() * 8)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 22 + 14) + 'px';
            heart.style.animationDuration = (Math.random() * 5 + 7) + 's';
            heart.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('heartBg').appendChild(heart);

            setTimeout(() => heart.remove(), 9000);
        }

        setInterval(createFloatingHeart, 420);
        for (let i = 0; i < 14; i++) {
            setTimeout(createFloatingHeart, i * 250);
        }
    </script>
</body>
</html>
