<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💕 Thank You, Rei 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #ffd1ff 100%);
            font-family: 'Segoe UI', 'Arial', 'Georgia', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            cursor: pointer;
        }

        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            opacity: 0.6;
            animation: floatUp 8s linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 60px 60px 80px 80px;
            padding: 40px 30px;
            max-width: 550px;
            width: 90%;
            margin: 30px auto;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.4);
            text-align: center;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.2rem;
            color: #d63384;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .message {
            background: #fff0f5;
            padding: 24px 22px;
            border-radius: 40px;
            margin: 25px 0;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #a83c6e;
            text-align: left;
            border-left: 5px solid #ff69b4;
            border-right: 5px solid #ff69b4;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .message p {
            margin-bottom: 18px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .btn-return {
            background: linear-gradient(135deg, #ff758f, #ff4d6d);
            color: white;
        }

        .btn-return:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.35);
        }

        @media (max-width: 500px) {
            .container {
                padding: 25px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .message {
                font-size: 1rem;
            }
            .btn {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="heart-bg" id="heartBg"></div>

    <div class="container">
        <h1>
            <span>🌸</span>
            <span>Thank you, little Rei</span>
            <span>💕</span>
        </h1>

        <div class="message">
            <p><strong>Thank you, little Rei.</strong> You just made my whole world a little brighter.</p>
            <p>I promise to be good to you. To respect you. To never give you a reason to doubt why you said yes.</p>
            <p>This is just the beginning, and I'm already excited for every moment with you.</p>
        </div>

        <div class="button-group">
            <a class="btn btn-return" href="second.html">Back to the page</a>
        </div>
    </div>

    <script>
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = ['💖', '💕', '💗', '💓', '💝', '🌸', '🌷', '💘'][Math.floor(Math.random() * 8)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 20 + 14) + 'px';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            heart.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('heartBg').appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 9000);
        }

        setInterval(createFloatingHeart, 400);
        for (let i = 0; i < 14; i++) {
            setTimeout(createFloatingHeart, i * 220);
        }
    </script>
</body>
</html>
